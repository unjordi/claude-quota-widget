name: Release Windows exe

# Cierra el circulo "nosotros subimos -> los demas reciben" para Windows.
#
# Cuando 'main' avanza (= release deliberado que unjordi mergea en la web) y toca windows/**,
# este workflow compila el widget como .exe SELF-CONTAINED single-file (no necesita .NET runtime
# ni SDK en la maquina destino) y lo publica como asset del release rolling "windows-latest".
# El autoupdate del widget (fase 2) baja ese exe y hace swap -> el usuario recibe la actualizacion
# SIN instalar el .NET SDK ni recompilar. Solo Windows por ahora (mac compila Swift rapido con las
# Command Line Tools; Linux es QML sin compilar; ambos siguen con el autoupdate git-based actual).
#
# Se puede disparar a mano desde la pestana Actions (workflow_dispatch) para probar / re-publicar.

on:
  push:
    branches: [main]
    paths:
      - 'windows/**'
      - '.github/workflows/release-windows.yml'
  workflow_dispatch:

permissions:
  contents: write   # crear/borrar el release y subir el asset

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained single-file exe
        shell: pwsh
        run: |
          dotnet publish windows/src/ClaudeQuota/ClaudeQuota.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish
          if (-not (Test-Path publish/ClaudeQuota.exe)) { throw "no se genero publish/ClaudeQuota.exe" }
          "exe size: $((Get-Item publish/ClaudeQuota.exe).Length) bytes"

      - name: Publish rolling 'windows-latest' release with the exe
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $sha   = "${{ github.sha }}"
          $short = $sha.Substring(0,7)
          # Rolling: borro el release + su tag y lo recreo apuntando al sha actual, para que el tag
          # 'windows-latest' SIEMPRE refleje el commit del exe publicado. El updater compara su sha
          # embebido contra 'build-sha:' del cuerpo del release.
          gh release delete windows-latest --cleanup-tag --yes 2>$null
          gh release create windows-latest publish/ClaudeQuota.exe `
            --target $sha `
            --title "Widget de Windows (rolling)" `
            --notes "Widget de Claude Quota para Windows, self-contained single-file (sin .NET SDK).`nbuild-sha: $sha`nAutoupdate: el widget baja este exe y hace swap."
          "Publicado windows-latest @ $short"
